<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SigInt Project</title>
  <link rel="stylesheet" href="styles.css">

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    .chart-panel {
      background: transparent;
      height: 400px;
      width: 100%;
      max-width: 1400px;
      margin: 40px auto;
    }

    .chart-panel canvas {
      width: 100% !important;
      height: 100% !important;
    }

    /* Remove extra spacing */
    h1 {
      margin-bottom: 10px;
    }

    .hero-box .overlay > div {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
  </style>
</head>

<body>
  <main>
    <div class="hero-box">
      <div class="overlay">
        <div>
          <h1>Graphs</h1>

          <section id="sigint-options">
            <button onclick="window.location.href='index.html'">Home</button>
            <button onclick="window.location.href='login.html'">Login</button>
            <button onclick="window.location.href='logs.html'">Logs</button>
          </section>

          <!-- ONLY MIC CHARTS -->
          <div class="chart-panel">
            <h3>Mic 1</h3>
            <canvas id="chartMic1"></canvas>
          </div>

          <div class="chart-panel">
            <h3>Mic 2</h3>
            <canvas id="chartMic2"></canvas>
          </div>

          <div class="chart-panel">
            <h3>Mic 3</h3>
            <canvas id="chartMic3"></canvas>
          </div>

          <div class="chart-panel">
            <h3>Mic 4</h3>
            <canvas id="chartMic4"></canvas>
          </div>

        </div>
      </div>
    </div>
  </main>

  <script>
    // === MIC CHARTS ONLY ===
    const BIN_COUNT = 4097;
    const bins = Array.from({ length: BIN_COUNT }, (_, i) => i);

    const baseOptions = {
      type: 'line',
      data: {
        labels: bins.map(String),
        datasets: []
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'nearest', intersect: false },
        plugins: {
          legend: { display: false }
        },
        scales: {
          x: { title: { display: true, text: 'Bin' } },
          y: { title: { display: true, text: 're' }, beginAtZero: false }
        }
      }
    };

    const chartMic1 = new Chart(
      document.getElementById('chartMic1').getContext('2d'),
      JSON.parse(JSON.stringify(baseOptions))
    );

    const chartMic2 = new Chart(
      document.getElementById('chartMic2').getContext('2d'),
      JSON.parse(JSON.stringify(baseOptions))
    );

    const chartMic3 = new Chart(
      document.getElementById('chartMic3').getContext('2d'),
      JSON.parse(JSON.stringify(baseOptions))
    );

    const chartMic4 = new Chart(
      document.getElementById('chartMic4').getContext('2d'),
      JSON.parse(JSON.stringify(baseOptions))
    );

    const API_URL = '/data/data.json';

    async function fetchNewData() {
      try {
        const res = await fetch(API_URL);
        if (!res.ok) {
          console.error('API error', res.status);
          return;
        }

        const filesData = await res.json();

        const micMap = {
          1: filesData.find(f => /Mic_1/i.test(f.file)) || null,
          2: filesData.find(f => /Mic_2/i.test(f.file)) || null,
          3: filesData.find(f => /Mic_3/i.test(f.file)) || null,
          4: filesData.find(f => /Mic_4/i.test(f.file)) || null
        };

        function buildDataset(fileData, color) {
          if (!fileData) return [];

          const map = new Map();
          fileData.points.forEach(p => {
            map.set(Number(p.bin), Number(p.re));
          });

          const values = bins.map(bin => {
            const v = map.get(bin);
            return v !== undefined ? v : null;
          });

          return [{
            label: fileData.file,
            data: values,
            borderColor: color,
            backgroundColor: color.replace('1)', '0.2)'),
            borderWidth: 1,
            fill: false,
            spanGaps: true,
            pointRadius: 0,
            tension: 0
          }];
        }

        chartMic1.data.datasets = buildDataset(micMap[1], 'rgba(54, 162, 235, 1)');
        chartMic2.data.datasets = buildDataset(micMap[2], 'rgba(255, 99, 132, 1)');
        chartMic3.data.datasets = buildDataset(micMap[3], 'rgba(75, 192, 192, 1)');
        chartMic4.data.datasets = buildDataset(micMap[4], 'rgba(255, 206, 86, 1)');

        chartMic1.update();
        chartMic2.update();
        chartMic3.update();
        chartMic4.update();

      } catch (err) {
        console.error('Error fetching data:', err);
      }
    }

    fetchNewData();
    setInterval(fetchNewData, 5000);
  </script>
</body>
</html>
